<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません｜AIコンサルティング株式会社</title>
<meta name="theme-color" content="#E72FC2">
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .nf {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px;
    position: relative;
  }
  .nf__num {
    font-size: clamp(120px, 22vw, 240px);
    font-weight: 900;
    line-height: 1;
    background: var(--grad-text);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 24px;
    letter-spacing: -.04em;
  }
  .nf h1 { font-size: clamp(24px, 4vw, 36px); margin-bottom: 16px; }
  .nf p { color: var(--text-soft); margin-bottom: 36px; font-size: 16px; }
</style>
</head>
<body>
<main>
  <div class="nf container-narrow">
    <div>
      <div class="nf__num">404</div>
      <h1>ページが見つかりません</h1>
      <p>お探しのページは移動または削除された可能性があります。<br>お手数ですが、トップページから目的のページをお探しください。</p>
      <a href="/" class="btn btn-primary">トップページへ戻る <span class="btn-arrow">→</span></a>
    </div>
  </div>
</main>
</body>
</html>
